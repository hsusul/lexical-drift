input_path: data/raw/synth.csv
output_dir: artifacts/multitask
random_seed: 42
encoder_model: distilbert-base-uncased
max_length: 128
batch_size: 8
train_months: 8
hidden_dim: 128
layers: 1
dropout: 0.2
lr: 0.0005
epochs: 2
test_size: 0.2
drift_lambda: 0.3
drift_target_metric: cosine
pooling: cls
freeze_encoder: false
threshold: 0.5
use_time_embeddings: true
loss_type: bce
pos_weight: null
focal_gamma: 2.0
