input_path: data/raw/synth.csv
output_dir: artifacts/e2e
random_seed: 42
encoder_model: distilbert-base-uncased
max_length: 128
batch_size: 8
train_months: 8
gru_hidden_dim: 128
gru_layers: 1
dropout: 0.2
lr: 0.0005
epochs: 2
test_size: 0.2
pooling: cls
freeze_encoder: false
pretrained_encoder_path: ""
use_time_embeddings: true
loss_type: bce
pos_weight: null
focal_gamma: 2.0
train_eval_threshold_mode: fixed
train_eval_calibration_metric: f1
