input_path: data/processed/real.parquet
output_dir: artifacts/real_eval
random_seed: 42
model_type: baseline_lr
encoder_model: distilbert-base-uncased
max_length: 128
batch_size: 16
cache_embeddings: true
cache_dir: artifacts/real_eval/cache
train_months: 3
lr: 0.001
gru_hidden_dim: 128
gru_layers: 1
dropout: 0.2
epochs: 2
threshold_mode: fixed
fixed_threshold: 0.5
calibration_metric: balanced_accuracy
test_size: 0.5
